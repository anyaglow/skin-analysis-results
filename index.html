<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Analysis Results</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rose:     #F9D5D3;
    --blush:    #F2B5B0;
    --lavender: #E8D5F0;
    --mint:     #C8E6D8;
    --peach:    #FAE0C8;
    --sky:      #C8DCF0;
    --cream:    #FDF6F0;
    --text:     #5A4A52;
    --muted:    #9E8A92;
    --accent:   #D4748A;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Static soft background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 90% 0%,   #F9D5D350 0%, transparent 55%),
      radial-gradient(ellipse at 10% 100%, #E8D5F050 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%,  #FAE0C830 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .page-wrap { position: relative; z-index: 1; }

  /* Header */
  header {
    text-align: center;
    padding: 52px 24px 34px;
  }
  .flower-row {
    font-size: 24px;
    letter-spacing: 10px;
    margin-bottom: 16px;
    display: block;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .subtitle {
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.4px;
  }
  .badge {
    display: inline-block;
    margin-top: 14px;
    background: white;
    border: 1.5px solid var(--blush);
    color: var(--accent);
    font-size: 11.5px;
    font-weight: 500;
    padding: 5px 18px;
    border-radius: 20px;
  }

  /* Filters */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 0 20px 38px;
  }
  .f-btn {
    background: white;
    border: 1.5px solid #EDD8DA;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s, color 0.18s;
  }
  .f-btn:hover, .f-btn.active {
    background: var(--blush);
    border-color: var(--accent);
    color: #9E3050;
    font-weight: 500;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(340px,100%), 1fr));
    gap: 22px;
    padding: 0 clamp(14px, 3vw, 44px) 60px;
    max-width: 1280px;
    margin: 0 auto;
  }

  /* Card */
  .card {
    background: white;
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(180,100,120,0.08);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(180,100,120,0.14);
  }

  /* Color strip */
  .card-strip {
    height: 4px;
    background: linear-gradient(90deg, #F9D5D3, #E8D5F0, #C8DCF0, #C8E6D8);
  }

  /* Image */
  .img-wrap {
    position: relative;
    height: 260px;
    overflow: hidden;
    background: var(--rose);
  }
  .img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
    transition: transform 0.35s ease;
    display: block;
    padding: 6px;
  }
  .card:hover .img-wrap img { transform: scale(1.03); }

  /* Placeholder when image missing */
  .img-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--rose);
  }
  .img-placeholder .ph-icon { font-size: 36px; }
  .img-placeholder .ph-text { font-size: 10px; color: var(--muted); text-align: center; padding: 0 12px; }

  .img-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(70,40,50,0.48));
    padding: 22px 14px 10px;
    font-size: 10.5px;
    color: rgba(255,255,255,0.92);
    font-weight: 500;
    letter-spacing: 0.2px;
  }
  .corner-flower {
    position: absolute;
    top: 10px; right: 12px;
    font-size: 18px;
    pointer-events: none;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.12));
  }

  /* Tags */
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    padding: 11px 13px 9px;
    border-bottom: 1px solid #F8EFF0;
    min-height: 46px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10.5px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
  }
  .tag .dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .tag.high   { background:#F9D5D3; color:#B03050; }
  .tag.high .dot { background:#D4748A; }
  .tag.medium { background:#E8D5F0; color:#7A4A9A; }
  .tag.medium .dot { background:#B080CC; }
  .tag.low-t  { background:#C8DCF0; color:#3A608A; }
  .tag.low-t .dot { background:#7AAAD0; }

  /* Scores */
  .scores { padding: 10px 13px 15px; }
  .scores-header {
    font-size: 9.5px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 9px;
  }
  .s-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 5px;
  }
  .s-label {
    font-size: 10.5px;
    color: var(--text);
    width: 126px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .s-track {
    flex: 1;
    height: 6px;
    background: #F5EEF2;
    border-radius: 3px;
    overflow: hidden;
  }
  .s-fill {
    height: 100%;
    border-radius: 3px;
  }
  .s-fill.high   { background: linear-gradient(90deg, #F2B5B0, #D4748A); }
  .s-fill.medium { background: linear-gradient(90deg, #C4A0C8, #A070B8); }
  .s-fill.low    { background: linear-gradient(90deg, #B8CCDC, #8AAAC8); }
  .s-val {
    font-size: 10.5px;
    font-weight: 500;
    color: var(--muted);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--rose);
  }
  footer em { color: var(--accent); font-style: normal; }

  @media(max-width:420px) {
    .s-label { width:92px; font-size:10px; }
  }
</style>
</head>

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const CLASSES = [
  "rough_texture","hyperpigmentation","enlarged_pores","oiliness",
  "wrinkles","papule","pustule","redness","comedone_open","sagging","dark_circles"
];

const CAT = {
  acne:         ["papule","pustule","comedone_open","redness"],
  pigmentation: ["hyperpigmentation","dark_circles"],
  texture:      ["rough_texture","enlarged_pores","oiliness"],
  aging:        ["wrinkles","sagging"]
};

const FLOWERS  = ["🌸","🌷","🌼","🪷","💐","🌺","🌹","🫧","🍀","✿"];
const BG_COLORS = ["#F9D5D3","#E8D5F0","#C8E6D8","#FAE0C8","#C8DCF0"];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const barCls = v => v>=.5?'high':v>=.25?'medium':'low';
const tagCls = v => v>=.6?'high':v>=.4?'medium':'low-t';

function getCategories(w) {
  const cats = new Set();
  for (const [cat, arr] of Object.entries(CAT))
    if (arr.some(c => w[c] >= 0.5)) cats.add(cat);
  return [...cats];
}

// ── BUILD CARD ────────────────────────────────────────────────────────────────
function buildCard(item, idx) {
  const sorted   = [...CLASSES].sort((a,b) => item.w[b]-item.w[a]);
  const detected = sorted.filter(c => item.w[c] >= 0.5);
  const cats     = getCategories(item.w);
  const flower   = FLOWERS[idx % FLOWERS.length];
  const bg       = BG_COLORS[idx % BG_COLORS.length];

  const tagsHTML = detected.length
    ? detected.map(c =>
        `<span class="tag ${tagCls(item.w[c])}">
           <span class="dot"></span>${c.replace(/_/g,' ')}: ${item.w[c].toFixed(2)}
         </span>`).join('')
    : `<span style="font-size:11px;color:#C0A8B0;font-style:italic">No conditions above threshold</span>`;

  const scoresHTML = sorted.map(c => {
    const v = item.w[c];
    return `<div class="s-row">
      <div class="s-label">${c.replace(/_/g,' ')}</div>
      <div class="s-track"><div class="s-fill ${barCls(v)}" style="width:${v*100}%"></div></div>
      <div class="s-val">${v.toFixed(2)}</div>
    </div>`;
  }).join('');

  const imgSrc = IMAGE_FOLDER + item.n;

  const card = document.createElement('div');
  card.className  = 'card';
  card.dataset.cats = cats.join(',');

  card.innerHTML = `
    <div class="card-strip"></div>
    <div class="img-wrap" style="background:${bg}">
      <img src="${imgSrc}" alt="${item.n}"
           onerror="this.replaceWith(makePlaceholder('${flower}','${item.n}'))">
      <div class="img-label">${item.n}</div>
      <div class="corner-flower">${flower}</div>
    </div>
    <div class="tags">${tagsHTML}</div>
    <div class="scores">
      <div class="scores-header">All confidence scores</div>
      ${scoresHTML}
    </div>`;

  return card;
}

function makePlaceholder(flower, name) {
  const div = document.createElement('div');
  div.className = 'img-placeholder';
  div.innerHTML = `<div class="ph-icon">${flower}</div><div class="ph-text">${name}</div>`;
  return div;
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function doFilter(cat, btn) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.card').forEach(card => {
    const show = cat === 'all' || card.dataset.cats.split(',').includes(cat);
    card.style.display = show ? '' : 'none';
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const grid = document.getElementById('grid');
DATA.forEach((item, i) => grid.appendChild(buildCard(item, i)));
